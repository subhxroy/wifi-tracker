# Mosquitto config for Sentira local dev.
# Allows anonymous LAN-only connections (matches RuView's default posture).
# For anything beyond your own bench, see docs/SECURITY_HARDENING.md and
# enable auth + TLS before exposing the broker.

listener 1883 0.0.0.0
allow_anonymous true

# WebSocket listener — handy for in-browser MQTT debugging.
listener 9001 0.0.0.0
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
