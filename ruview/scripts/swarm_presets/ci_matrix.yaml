# CI-optimized preset: 3 nodes, star topology, 30s, minimal assertions
swarm:
  name: ci-matrix
  duration_s: 30
  topology: star
  aggregator_port: 5005

nodes:
  - role: coordinator
    node_id: 0
    scenario: 0
    channel: 6
    edge_tier: 1

  - role: sensor
    node_id: 1
    scenario: 1
    channel: 6
    tdm_slot: 1

  - role: sensor
    node_id: 2
    scenario: 2
    channel: 6
    tdm_slot: 2

assertions:
  - all_nodes_boot
  - no_crashes
  - tdm_no_collision
  - max_boot_time_s: 10
