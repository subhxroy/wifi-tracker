# Scale test: 6 fully-connected nodes in mesh topology, 90s
swarm:
  name: large-mesh
  duration_s: 90
  topology: mesh
  aggregator_port: 5005

nodes:
  - role: coordinator
    node_id: 0
    scenario: 0
    channel: 6
    edge_tier: 2
    is_gateway: true

  - role: sensor
    node_id: 1
    scenario: 1
    channel: 6
    tdm_slot: 1

  - role: sensor
    node_id: 2
    scenario: 2
    channel: 6
    tdm_slot: 2

  - role: sensor
    node_id: 3
    scenario: 3
    channel: 6
    tdm_slot: 3

  - role: sensor
    node_id: 4
    scenario: 4
    channel: 6
    tdm_slot: 4

  - role: sensor
    node_id: 5
    scenario: 5
    channel: 6
    tdm_slot: 5

assertions:
  - all_nodes_boot
  - no_crashes
  - tdm_no_collision
  - all_nodes_produce_frames
  - coordinator_receives_from_all
  - no_heap_errors
  - frame_rate_above: 10
  - max_boot_time_s: 15
