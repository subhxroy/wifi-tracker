# Multi-hop relay chain: 4 nodes in line topology, 60s
swarm:
  name: line-relay
  duration_s: 60
  topology: line
  aggregator_port: 5005

nodes:
  - role: gateway
    node_id: 0
    scenario: 0
    channel: 6
    edge_tier: 2
    is_gateway: true

  - role: coordinator
    node_id: 1
    scenario: 0
    channel: 6
    edge_tier: 1

  - role: sensor
    node_id: 2
    scenario: 2
    channel: 6
    tdm_slot: 2

  - role: sensor
    node_id: 3
    scenario: 1
    channel: 6
    tdm_slot: 3

assertions:
  - all_nodes_boot
  - no_crashes
  - tdm_no_collision
  - all_nodes_produce_frames
  - max_boot_time_s: 12
